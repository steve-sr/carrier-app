<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carrier</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --primary: #111827;
      --primary-hover: #1f2937;
      --danger: #dc2626;
      --warning: #d97706;
      --success: #16a34a;
      --radius: 16px;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 18px;
    }

    .brand {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }

    .nav-section {
      margin-bottom: 24px;
    }

    .nav-title {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      letter-spacing: 0.08em;
    }

    .nav-link {
      display: block;
      padding: 12px 14px;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      margin-bottom: 8px;
      transition: 0.2s ease;
    }

    .nav-link:hover {
      background: var(--surface-soft);
    }

    .main {
      padding: 32px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 30px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.03em;
    }

    .page-subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      gap: 20px;
    }

    .grid-4 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 16px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: white;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--surface-soft);
    }

    .btn-danger {
      background: var(--danger);
    }

    .btn-warning {
      background: var(--warning);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      text-align: left;
      padding: 14px 12px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 16px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: white;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: 0.2s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #cbd5e1;
      box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.12);
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .badge-success {
      background: #dcfce7;
      color: #166534;
    }

    .badge-warning {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge-neutral {
      background: #e5e7eb;
      color: #374151;
    }

    .flash {
      padding: 14px 16px;
      border-radius: 14px;
      margin-bottom: 16px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid transparent;
    }

    .flash.success {
      background: #ecfdf5;
      color: #166534;
      border-color: #bbf7d0;
    }

    .flash.danger {
      background: #fef2f2;
      color: #991b1b;
      border-color: #fecaca;
    }

    .flash.warning {
      background: #fffbeb;
      color: #92400e;
      border-color: #fde68a;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 1024px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .grid-4,
      .grid-2,
      .form-grid {
        grid-template-columns: 1fr;
      }

      .main {
        padding: 20px;
      }

      .page-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">Carrier</div>

      <div class="nav-section">
        <div class="nav-title">Overview</div>
        <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
      </div>

      <div class="nav-section">
        <div class="nav-title">Inventory</div>
        <a class="nav-link" href="{{ url_for('product_list') }}">Products</a>
      </div>

      <div class="nav-section">
        <div class="nav-title">Sales</div>
        <a class="nav-link" href="{{ url_for('order_list') }}">Orders</a>
        <a class="nav-link" href="{{ url_for('order_create') }}">New Order</a>
      </div>
    </aside>

    <main class="main">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
