{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">New Customer</h1>
    <div class="page-subtitle">Registrá un nuevo cliente.</div>
  </div>
</div>

<div class="card">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" name="full_name" required>
      </div>

      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" name="phone" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email">
      </div>

      <div class="form-group full">
        <label>Notas</label>
        <textarea name="notes"></textarea>
      </div>
    </div>

    <div class="actions">
      <button class="btn" type="submit">Guardar cliente</button>
      <a class="btn btn-secondary" href="{{ url_for('customer_list') }}">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
