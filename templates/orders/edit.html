{% extends "base.html" %}
{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Edit Order #{{ order.id }}</h1>
    <div class="page-subtitle">Editá cliente, entrega y notas de la orden.</div>
  </div>
</div>

<div class="card">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>Cliente</label>
        <select name="customer_id" required>
          {% for customer in customers %}
            <option value="{{ customer.id }}" {% if customer.id == order.customer_id %}selected{% endif %}>
              {{ customer.full_name }} - {{ customer.phone }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Entrega</label>
        <select name="fulfillment_method" required>
          <option value="PICKUP" {% if order.fulfillment_method == 'PICKUP' %}selected{% endif %}>Retiro</option>
          <option value="SHIPPING" {% if order.fulfillment_method == 'SHIPPING' %}selected{% endif %}>Envío</option>
        </select>
      </div>

      <div class="form-group">
        <label>Lugar de retiro</label>
        <input type="text" name="pickup_location" value="{{ order.pickup_location or '' }}">
      </div>

      <div class="form-group full">
        <label>Dirección de envío</label>
        <textarea name="shipping_address">{{ order.shipping_address or '' }}</textarea>
      </div>

      <div class="form-group full">
        <label>Notas</label>
        <textarea name="notes">{{ order.notes or '' }}</textarea>
      </div>
    </div>

    <div class="actions">
      <button class="btn" type="submit">Guardar cambios</button>
      <a class="btn btn-secondary" href="{{ url_for('order_detail', order_id=order.id) }}">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
